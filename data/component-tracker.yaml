planned:
  -
    name: Dialog / Modal
    category: Feedback
    priority: High
    description: Overlay dialog with backdrop, header, body, footer actions
    dependsOn: Button, DismissAction
    notes: Common pattern in KYB flows
  -
    name: Toast / Snackbar
    category: Feedback
    priority: High
    description: Temporary notification bar with auto-dismiss
    dependsOn: DismissAction
    notes: For success/error feedback
  -
    name: Alert / InlineNotification
    category: Feedback
    priority: High
    description: Persistent inline message with icon and dismiss
    dependsOn: DismissAction
    notes: Replaces Announcement for inline use
  -
    name: Badge
    category: Data Display
    priority: High
    description: Small count or status indicator on icons/avatars
    notes: Needed for nav items, notifications
  -
    name: Avatar
    category: Data Display
    priority: High
    description: User/entity photo or initials circle
    notes: Used in SideNav UserProfile, comments
  -
    name: Pagination
    category: Navigation
    priority: High
    description: Page navigation with prev/next and page numbers
    dependsOn: Button, IconButton
    notes: Used with DataTable
  -
    name: Skeleton / Loading
    category: Feedback
    priority: Medium
    description: Shimmer placeholder for loading states
    notes: For progressive content loading
  -
    name: Popover
    category: Feedback
    priority: Medium
    description: Anchored floating content panel (non-modal)
    dependsOn: Caret, DropdownPanel
    notes: For rich hover/click content
  -
    name: Card
    category: Containers
    priority: Medium
    description: Bordered content container with header and actions
    notes: General-purpose content wrapper
  -
    name: Divider
    category: Utility
    priority: Medium
    description: Horizontal or vertical separator line
    notes: For section separation
  -
    name: Textarea
    category: Form Inputs
    priority: Medium
    description: Multi-line text input with auto-resize
    dependsOn: FieldLabel, FieldCaption, FieldValidation
    notes: For notes, comments
  -
    name: SearchInput
    category: Form Inputs
    priority: Medium
    description: Text input with search icon and clear action
    dependsOn: TextInput, DismissAction
    notes: For filtering lists/tables
  -
    name: Slider / RangeInput
    category: Form Inputs
    priority: Low
    description: Continuous or stepped range selector
    notes: For score thresholds
  -
    name: FileUpload
    category: Form Inputs
    priority: Low
    description: Drag-and-drop or click-to-browse file input
    dependsOn: Button
    notes: For document upload flows
  -
    name: ProgressBar
    category: Progress
    priority: Low
    description: Linear determinate/indeterminate progress
    notes: For upload/processing progress
  -
    name: EmptyState
    category: Feedback
    priority: Low
    description: Illustration + message for zero-data scenarios
    dependsOn: Button
    notes: For empty tables, search results
  -
    name: TopNav / AppBar
    category: Navigation
    priority: Low
    description: Horizontal top navigation bar
    dependsOn: Button, Avatar, Badge
    notes: If app needs a top bar
  -
    name: SegmentedControl
    category: Core Controls
    priority: Low
    description: Toggle between 2–5 mutually exclusive options
    notes: Alternative to Tabs for settings
  -
    name: Timeline
    category: Data Display
    priority: Low
    description: Vertical timeline with events and connectors
    notes: For entity history/audit trail
  -
    name: TreeView
    category: Navigation
    priority: Low
    description: Hierarchical collapsible list
    notes: For nested entity structures
