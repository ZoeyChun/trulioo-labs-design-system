<!-- Bank Verification — result page (reference demo). Reads form state from sessionStorage. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bank Verification Results — Trulioo Labs</title>

  <link rel="stylesheet" href="../../tokens/tokens.css">
  <link rel="stylesheet" href="../../Components/button/button.css">
  <link rel="stylesheet" href="../../Components/tag/tag.css">
  <link rel="stylesheet" href="../../Components/select/select.css">
  <link rel="stylesheet" href="../../Components/select/caret.css">
  <link rel="stylesheet" href="../../Components/select/dropdown-panel.css">
  <link rel="stylesheet" href="../shared/app-shell.css">
  <link rel="stylesheet" href="../document-verification/document-verification.css">
  <link rel="stylesheet" href="bank-verification.css">
  <link rel="stylesheet" href="bank-verification-result.css">
</head>
<body>

  <div class="app-shell bv-result-shell" id="bv-result-view">

    <nav class="app-sidenav" aria-label="Primary">
      <div class="app-sidenav__top">
        <a class="app-sidenav__logo" href="index.html" aria-label="Trulioo home">
          <img src="../../assets/TL_logo.svg" alt="Trulioo" width="40" height="40">
        </a>
      </div>
      <div class="app-sidenav__nav">
        <a class="app-sidenav__item" href="#" aria-label="Home">
          <span class="app-sidenav__item-icon">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <path d="M2.5 7.5 8 2.5l5.5 5V13a1 1 0 0 1-1 1H10v-4H6v4H3.5a1 1 0 0 1-1-1V7.5z"/>
            </svg>
          </span>
        </a>
        <a class="app-sidenav__item app-sidenav__item--active" href="index.html" aria-label="Labs" aria-current="page">
          <span class="app-sidenav__item-icon">
            <img src="../../assets/Lab_Icon.svg" alt="" width="24" height="24" aria-hidden="true">
          </span>
        </a>
      </div>
      <div class="app-sidenav__bottom">
        <span class="app-avatar" aria-label="Zoey Chung">ZC</span>
      </div>
    </nav>

    <main class="app-main dv-panel">

      <div class="dv-header">
        <div class="dv-header__top">
          <div class="dv-header__title-group bv-result-header__title-group">
            <a href="index.html" class="bv-result-back" aria-label="Back to verification form">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path d="M10 3L5 8l5 5"/></svg>
            </a>
            <h1 class="dv-title" id="bv-result-title">Jane Doe</h1>
            <span id="bv-result-status" class="tds-tag tds-tag--positive tds-tag--md"></span>
          </div>
          <div class="dv-header__actions">
            <button class="tds-btn tds-btn--secondary tds-btn--lg" type="button">
              <span class="tds-btn__leading-icon">
                <svg viewBox="0 0 576 512" fill="currentColor" aria-hidden="true"><path d="M96.5 0c-35.3 0-64 28.7-64 64l0 384c0 35.3 28.7 64 64 64l256 0c35.3 0 64-28.7 64-64l0-96 78.1 0-31 31c-9.4 9.4-9.4 24.6 0 33.9s24.6 9.4 33.9 0l72-72c9.4-9.4 9.4-24.6 0-33.9l-72-72c-9.4-9.4-24.6-9.4-33.9 0s-9.4 24.6 0 33.9l31 31-78.1 0 0-133.5c0-17-6.7-33.3-18.7-45.3L291.2 18.7C279.2 6.7 263 0 246 0L96.5 0zM358 176l-93.5 0c-13.3 0-24-10.7-24-24L240.5 58.5 358 176zM224.5 328c0-13.3 10.7-24 24-24l104 0 0 48-104 0c-13.3 0-24-10.7-24-24z"/></svg>
              </span>
              Export
            </button>
            <button class="app-truai-btn" type="button">
              <span class="app-truai-btn__icon">
                <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 1l1.5 3.9 3.9 1.5-3.9 1.5L8 11.8 6.5 7.9 2.6 6.4l3.9-1.5L8 1z"/><path d="M12.8 10.2l.7 1.7 1.7.7-1.7.7-.7 1.7-.7-1.7-1.7-.7 1.7-.7.7-1.7z"/></svg>
              </span>
              TruAI
            </button>
          </div>
        </div>

        <div class="dv-meta">
          <div class="dv-meta__item">
            <span class="dv-meta__label">Country / Jurisdiction</span>
            <span class="dv-meta__value" id="bv-result-country"></span>
          </div>
          <span class="dv-meta__divider" aria-hidden="true"></span>
          <div class="dv-meta__item">
            <span class="dv-meta__label">Transaction ID</span>
            <span class="dv-meta__value" id="bv-result-txn"></span>
          </div>
          <span class="dv-meta__divider" aria-hidden="true"></span>
          <div class="dv-meta__item">
            <span class="dv-meta__label">Date</span>
            <span class="dv-meta__value" id="bv-result-date"></span>
          </div>
        </div>
      </div>

      <div class="dv-content">
        <div class="dv-columns" id="bv-result-columns">

          <aside class="dv-sidebar" id="bv-result-sidebar">
            <div class="dv-sidebar__block dv-sidebar__block--entity" id="bv-result-te-block">
              <div class="dv-sidebar__entity-head">
                <h2 class="dv-sidebar__heading">Test Entity</h2>
                <button type="button" class="dv-sidebar-toggle dv-sidebar-toggle--collapse" aria-expanded="true" aria-controls="bv-result-sidebar" aria-label="Collapse summary panel">
                  <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><rect x="3" y="4" width="14" height="12" rx="2"/><path d="M8 4v12"/></svg>
                </button>
              </div>
              <div class="dv-sidebar__entity-select">
                <div class="tds-select bv-result-te-select" id="bv-result-te-select"></div>
              </div>
            </div>

            <div class="dv-sidebar__block">
              <div class="bv-match-score-block">
                <h2 class="bv-match-score-block__title">Match Score</h2>
                <div class="dv-di-gauge" id="bv-result-gauge" aria-hidden="true"></div>
              </div>
            </div>

            <div class="dv-sidebar__block">
              <h2 class="dv-section-title">Summary</h2>
              <div class="dv-ai-card">
                <span class="dv-ai-badge">
                  <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 1l1.5 3.9 3.9 1.5-3.9 1.5L8 11.8 6.5 7.9 2.6 6.4l3.9-1.5L8 1z"/></svg>
                  TruAI
                </span>
                <p class="dv-ai-text" id="bv-result-truai"></p>
              </div>
            </div>

            <div class="dv-sidebar__block dv-collapsible dv-collapsible--open dv-sidebar__block--last">
              <button class="dv-collapsible__header" type="button" aria-expanded="true">
                <span class="dv-chevron" aria-hidden="true">
                  <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M6 4l4 4-4 4"/></svg>
                </span>
                <span class="dv-section-title">Appended Data</span>
              </button>
              <div class="dv-collapsible__body" id="bv-result-appended"></div>
            </div>
          </aside>

          <div class="dv-main bv-result-main">
            <button type="button" class="dv-sidebar-toggle dv-sidebar-toggle--expand" aria-expanded="false" aria-controls="bv-result-sidebar" aria-label="Show summary panel">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><rect x="3" y="4" width="14" height="12" rx="2"/><path d="M8 4v12"/></svg>
            </button>

            <section class="dv-doc-panel">
              <div class="dv-doc-panel__header dv-ni2-panelhead">
                <div class="dv-ni2-panelhead__title">
                  <h2 class="dv-doc-panel__title">Verification Results</h2>
                  <span id="bv-result-match-count" class="tds-tag tds-tag--positive tds-tag--sm"></span>
                </div>
                <a class="tds-btn tds-btn--secondary tds-btn--sm" href="index.html" id="bv-result-edit">Edit form</a>
              </div>

              <div class="dv-doc-panel__body bv-result-panel__body">
                <h3 class="dv-section-title bv-result-subtitle">Field Match Results</h3>

                <div class="dv-table bv-result-table">
                  <div class="dv-table__row dv-table__head">
                    <div class="dv-table__text-cell"><span class="dv-table__col-head">Signal</span></div>
                    <div class="dv-table__detail-cell"><span class="dv-table__col-head">Detail</span></div>
                    <div class="dv-table__label-cell"><span class="dv-table__col-head">Result</span></div>
                  </div>
                  <div id="bv-result-field-rows"></div>
                </div>

                <div class="bv-raw-panel">
                  <div class="bv-raw-panel__header">
                    <h3 class="bv-raw-panel__title">Raw Data</h3>
                  </div>
                  <div class="bv-raw-panel__body">
                    <div class="bv-raw-panel__toolbar">
                      <span class="bv-raw-panel__lang">json</span>
                      <button class="tds-btn tds-btn--secondary tds-btn--sm" type="button" id="bv-result-raw-copy">
                        <span class="tds-btn__leading-icon">
                          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" aria-hidden="true"><rect x="5.5" y="5.5" width="8" height="8" rx="1"/><path d="M10.5 5.5V4a1.5 1.5 0 0 0-1.5-1.5H4A1.5 1.5 0 0 0 2.5 4v5A1.5 1.5 0 0 0 4 10.5h1.5"/></svg>
                        </span>
                        Copy
                      </button>
                    </div>
                    <pre class="bv-raw-panel__pre" id="bv-result-raw"></pre>
                    <div class="bv-raw-panel__footer">
                      <button class="tds-btn tds-btn--secondary tds-btn--sm" type="button" id="bv-result-raw-expand">
                        <span class="tds-btn__leading-icon">
                          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M8 3v10M3 8h10"/></svg>
                        </span>
                        Expand all
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </section>
          </div>

        </div>
      </div>
    </main>
  </div>

  <script src="bank-verification-shared.js"></script>
  <script src="bank-verification-result.js"></script>
</body>
</html>
